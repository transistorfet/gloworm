name: bare-tests
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get install -y kconfig-frontends gcc-m68k-linux-gnu

      - name: Build bare tests
        run: |
          make C=.config_tests olddefconfig from=config/unit-tests.config overwrite=y
          make C=.config_tests bare-tests strict=y

